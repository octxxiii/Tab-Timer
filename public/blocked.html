<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receipt — Blocked</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', Courier, monospace;
    }
    .receipt {
      background: #f8f8f6;
      width: 320px;
      padding: 36px 32px 28px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }
    .brand {
      font-size: 10px;
      letter-spacing: 5px;
      color: #999;
      text-align: center;
      margin-bottom: 20px;
    }
    .dash {
      border: none;
      border-top: 1px dashed #ccc;
      margin: 16px 0;
    }
    .title {
      font-size: 18px;
      font-weight: bold;
      color: #111;
      text-align: center;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .domain {
      font-size: 13px;
      color: #333;
      text-align: center;
      font-weight: bold;
      margin-bottom: 6px;
    }
    .sub {
      font-size: 11px;
      color: #888;
      text-align: center;
      margin-bottom: 6px;
    }
    .context {
      font-size: 11px;
      color: #aaa;
      text-align: center;
      font-style: italic;
      line-height: 1.6;
    }
    .btn-back {
      display: block;
      width: 100%;
      background: #111;
      color: #f8f8f6;
      border: none;
      padding: 13px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 1px;
      cursor: pointer;
      margin-top: 4px;
    }
    .btn-back:hover {
      background: #333;
    }
    .footer {
      font-size: 9px;
      color: #bbb;
      text-align: center;
      letter-spacing: 2px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
<div class="receipt">
  <div class="brand">* RECEIPT *</div>
  <hr class="dash">
  <div class="title" id="title"></div>
  <hr class="dash">
  <div class="domain" id="domain"></div>
  <div class="sub" id="sub"></div>
  <div class="context" id="context"></div>
  <hr class="dash">
  <button class="btn-back" id="backBtn"></button>
  <div class="footer" id="footer"></div>
</div>
<script src="blocked.js"></script>
</body>
</html>
