<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receipt — Blocked</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', Courier, monospace;
    }
    .receipt {
      background: #f8f8f6;
      width: 320px;
      padding: 36px 32px 28px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }
    .brand {
      font-size: 10px;
      letter-spacing: 5px;
      color: #999;
      text-align: center;
      margin-bottom: 20px;
    }
    .dash {
      border: none;
      border-top: 1px dashed #ccc;
      margin: 16px 0;
    }
    .title {
      font-size: 18px;
      font-weight: bold;
      color: #111;
      text-align: center;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .domain {
      font-size: 13px;
      color: #333;
      text-align: center;
      font-weight: bold;
      margin-bottom: 6px;
    }
    .sub {
      font-size: 11px;
      color: #888;
      text-align: center;
      margin-bottom: 6px;
    }
    .context {
      font-size: 11px;
      color: #aaa;
      text-align: center;
      font-style: italic;
      line-height: 1.6;
    }
    .btn-back {
      display: block;
      width: 100%;
      background: #111;
      color: #f8f8f6;
      border: none;
      padding: 13px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 1px;
      cursor: pointer;
      margin-top: 4px;
    }
    .btn-back:hover {
      background: #333;
    }
    .footer {
      font-size: 9px;
      color: #bbb;
      text-align: center;
      letter-spacing: 2px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
<div class="receipt">
  <div class="brand">* RECEIPT *</div>
  <hr class="dash">
  <div class="title" id="title"></div>
  <hr class="dash">
  <div class="domain" id="domain"></div>
  <div class="sub" id="sub"></div>
  <div class="context" id="context"></div>
  <hr class="dash">
  <button class="btn-back" id="backBtn"></button>
  <div class="footer" id="footer"></div>
</div>
<script>
  const params = new URLSearchParams(location.search);
  const domain = params.get('domain') || '';
  const lang = params.get('lang') || 'ko';
  const ko = lang !== 'en';

  document.getElementById('title').textContent   = ko ? '포모도로 진행 중' : 'FOCUS IN PROGRESS';
  document.getElementById('domain').textContent  = domain;
  document.getElementById('sub').textContent     = ko ? '지금은 집중할 시간이에요.' : "This isn't the time for distractions.";
  document.getElementById('context').textContent = ko ? '목표에 집중하세요. 할 수 있어요.' : 'Stay focused. You got this.';
  document.getElementById('backBtn').textContent = ko ? '← 뒤로 가기' : '← GO BACK';
  document.getElementById('footer').textContent  = ko ? '* 포모도로가 끝나면 자동으로 해제됩니다 *' : '* UNLOCKS WHEN POMODORO ENDS *';

  document.getElementById('backBtn').addEventListener('click', () => {
    if (history.length > 1) history.back();
    else window.close();
  });
</script>
</body>
</html>
