<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Receipt</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <style>
    :root {
      --primary: #2196f3;
      --primary-dark: #1976d2;
      --success: #4caf50;
      --warning: #ff9800;
      --danger: #f44336;
      --text-primary: #212121;
      --text-secondary: #757575;
      --background: #ffffff;
      --surface: #f5f5f5;
      --border: #e0e0e0;
      --shadow: rgba(0, 0, 0, 0.1);
      --radius: 12px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --receipt-bg: #fafaf8;
      --receipt-border: #d4d0c8;
    }

    [data-theme="dark"] {
      --text-primary: #ffffff;
      --text-secondary: #b0b0b0;
      --background: #121212;
      --surface: #1e1e1e;
      --border: #333333;
      --shadow: rgba(0, 0, 0, 0.3);
      --receipt-bg: #1a1a17;
      --receipt-border: #3a3a32;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 380px;
      max-height: 600px;
      overflow-y: auto;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--background);
      color: var(--text-primary);
      transition: var(--transition);
      -webkit-font-smoothing: antialiased;
    }

    /* ===== HEADER ===== */
    .header {
      background: var(--background);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .app-title {
      font-family: 'Space Mono', monospace;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .app-title .receipt-icon {
      font-size: 18px;
    }

    .header-actions {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .icon-btn {
      background: transparent;
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      color: var(--text-secondary);
    }

    .icon-btn:hover {
      background: var(--surface);
      color: var(--text-primary);
    }

    .icon-btn .material-icons-round {
      font-size: 18px;
    }

    /* ===== NAV ===== */
    .nav-bar {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-btn {
      flex: 1;
      background: transparent;
      border: none;
      padding: 8px 4px;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      color: var(--text-secondary);
      font-size: 10px;
      border-bottom: 2px solid transparent;
    }

    .nav-btn:hover {
      background: var(--background);
      color: var(--text-primary);
    }

    .nav-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .nav-btn .material-icons-round {
      font-size: 18px;
    }

    /* ===== VIEW SYSTEM ===== */
    .views-container {
      position: relative;
      min-height: 400px;
    }

    .view {
      display: none;
      animation: fadeIn 0.2s ease;
    }

    .view.active {
      display: block;
    }

    /* ===== RECEIPT HOME VIEW ===== */
    .receipt-wrapper {
      padding: 12px;
    }

    .receipt-card {
      background: var(--receipt-bg);
      border: 1px solid var(--receipt-border);
      border-radius: 4px;
      font-family: 'Space Mono', monospace;
      position: relative;
      /* 위아래 지그재그 tear 효과 */
    }

    .receipt-card::before,
    .receipt-card::after {
      content: '';
      display: block;
      height: 8px;
      background:
        radial-gradient(circle at 50% 0%, var(--background) 5px, transparent 5px),
        linear-gradient(var(--receipt-bg), var(--receipt-bg));
      background-size: 16px 8px;
      background-position: 0 0;
    }

    .receipt-card::after {
      background:
        radial-gradient(circle at 50% 100%, var(--background) 5px, transparent 5px),
        linear-gradient(var(--receipt-bg), var(--receipt-bg));
      background-size: 16px 8px;
      background-position: 0 100%;
    }

    .receipt-inner {
      padding: 8px 16px 12px;
    }

    .receipt-header {
      text-align: center;
      padding: 8px 0 12px;
    }

    .receipt-store-name {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--text-primary);
      text-transform: uppercase;
    }

    .receipt-tagline {
      font-size: 9px;
      color: var(--text-secondary);
      letter-spacing: 1px;
      margin-top: 2px;
    }

    .receipt-divider {
      border: none;
      border-top: 1px dashed var(--receipt-border);
      margin: 8px 0;
    }

    .receipt-meta {
      font-size: 9px;
      color: var(--text-secondary);
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
    }

    /* 사이트 목록 */
    .receipt-items {
      margin: 4px 0;
    }

    .receipt-item {
      display: flex;
      align-items: center;
      padding: 5px 0;
      gap: 6px;
      cursor: pointer;
      transition: background 0.15s;
      border-radius: 3px;
      padding-left: 2px;
    }

    .receipt-item:hover {
      background: rgba(33, 150, 243, 0.05);
    }

    .receipt-item.active-site {
      color: var(--primary);
    }

    .receipt-item-favicon {
      width: 14px;
      height: 14px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .receipt-item-name {
      font-size: 11px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text-primary);
    }

    .receipt-item-dots {
      flex: 1;
      border-bottom: 1px dotted var(--receipt-border);
      margin: 0 4px;
      min-width: 20px;
    }

    .receipt-item-time {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-primary);
      white-space: nowrap;
      text-align: right;
      min-width: 52px;
    }

    .receipt-item.active-site .receipt-item-name,
    .receipt-item.active-site .receipt-item-time {
      color: var(--primary);
    }

    .receipt-active-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--primary);
      flex-shrink: 0;
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .receipt-empty {
      text-align: center;
      padding: 20px 0;
      color: var(--text-secondary);
      font-size: 10px;
      letter-spacing: 1px;
    }

    /* TOTAL 섹션 */
    .receipt-total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
    }

    .receipt-total-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--text-primary);
    }

    .receipt-total-value {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
    }

    /* 공유 버튼 */
    .receipt-share-btn {
      width: 100%;
      background: var(--text-primary);
      color: var(--background);
      border: none;
      padding: 10px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 3px;
      margin-top: 4px;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .receipt-share-btn:hover {
      opacity: 0.85;
    }

    .receipt-share-btn .material-icons-round {
      font-size: 15px;
    }

    .receipt-footer {
      text-align: center;
      padding: 10px 0 4px;
    }

    .receipt-footer-text {
      font-size: 8px;
      color: var(--text-secondary);
      letter-spacing: 1px;
    }

    /* ===== 시간 제한 섹션 ===== */
    .limit-section {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 10px 12px;
      margin-top: 10px;
    }

    .limit-section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .limit-section-title .material-icons-round {
      font-size: 14px;
    }

    .input-group {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .input-field {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 11px;
      transition: var(--transition);
      background: var(--background);
      color: var(--text-primary);
    }

    .input-field:focus {
      outline: none;
      border-color: var(--primary);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-danger {
      background: var(--danger) !important;
      color: white !important;
    }

    .btn-danger:hover {
      background: #d32f2f !important;
    }

    /* 제한 아이템 */
    .limit-item-detailed {
      background: var(--background);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
      border: 1px solid var(--border);
    }

    .limit-item-detailed:last-child { margin-bottom: 0; }

    .limit-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .limit-domain {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .limit-status {
      font-size: 11px;
      font-weight: 600;
      color: var(--primary);
      padding: 2px 8px;
      background: rgba(33, 150, 243, 0.1);
      border-radius: 12px;
    }

    .limit-status.over-limit {
      color: var(--danger);
      background: rgba(244, 67, 54, 0.1);
    }

    .limit-progress {
      height: 6px;
      background: var(--surface);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .limit-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--primary) 0%, var(--primary-dark) 100%);
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    .limit-item-detailed:has(.over-limit) .limit-progress-bar {
      background: linear-gradient(90deg, var(--danger) 0%, #d32f2f 100%);
    }

    .limit-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
    }

    .limit-used { color: var(--text-primary); font-weight: 500; }
    .limit-total { color: var(--text-secondary); }
    .limit-empty {
      text-align: center;
      color: var(--text-secondary);
      font-size: 11px;
      padding: 8px;
    }

    /* ===== 대시보드 뷰 ===== */
    .chart-container {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 0;
      margin-bottom: 12px;
      box-shadow: 0 2px 4px var(--shadow);
      overflow: hidden;
    }

    .chart-title {
      font-size: 13px;
      font-weight: 600;
      padding: 12px;
      cursor: pointer;
      user-select: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background-color 0.2s;
      color: var(--text-primary);
    }

    .chart-title:hover { background: var(--border); }

    .accordion-icon {
      font-size: 20px;
      transition: transform 0.3s;
      color: var(--text-secondary);
    }

    .chart-title.collapsed .accordion-icon {
      transform: rotate(180deg);
    }

    .chart-content { padding: 12px; }
    .accordion-content { display: block; }

    .chart-bar {
      height: 16px;
      background: var(--primary);
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    /* ===== 사이트 목록 뷰 ===== */
    .domains-list {
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 12px;
      overflow-y: auto;
    }

    .domain-item {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      transition: var(--transition);
      cursor: pointer;
    }

    .domain-item:last-child { border-bottom: none; }
    .domain-item:hover { background: var(--background); }

    .domain-favicon {
      width: 20px;
      height: 20px;
      margin-right: 8px;
      border-radius: 4px;
    }

    .domain-info { flex: 1; }

    .domain-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 2px;
    }

    .domain-stats {
      font-size: 10px;
      color: var(--text-secondary);
    }

    .domain-time { text-align: right; }

    .time-value {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .active-domain {
      background: rgba(33, 150, 243, 0.1) !important;
      border-left: 3px solid var(--primary);
    }

    /* ===== 사이트 상세 ===== */
    .detail-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .back-btn {
      background: var(--surface);
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    .back-btn:hover {
      background: var(--primary);
      color: white;
    }

    .back-btn .material-icons-round { font-size: 18px; }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-card {
      background: var(--surface);
      padding: 12px;
      border-radius: var(--radius);
      text-align: center;
      transition: var(--transition);
    }

    .stat-card.primary {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
    }

    .stat-icon { font-size: 24px; margin-bottom: 4px; opacity: 0.9; }
    .stat-value { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
    .stat-label { font-size: 10px; opacity: 0.8; text-transform: uppercase; letter-spacing: 0.5px; }

    /* ===== 설정 ===== */
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }

    .switch input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: var(--border);
      transition: 0.3s;
      border-radius: 24px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }

    input:checked + .slider { background-color: var(--primary); }
    input:checked + .slider:before { transform: translateX(20px); }

    /* ===== 알림 ===== */
    .notification {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--surface);
      color: var(--text-primary);
      padding: 12px 20px;
      border-radius: 8px;
      box-shadow: 0 4px 20px var(--shadow);
      display: flex;
      align-items: center;
      gap: 10px;
      transition: transform 0.3s ease;
      z-index: 1000;
      font-size: 12px;
      white-space: nowrap;
    }

    .notification.show { transform: translateX(-50%) translateY(0); }
    .notification.success { background: var(--success); color: white; }
    .notification.error { background: var(--danger); color: white; }

    /* ===== MISC ===== */
    .loading {
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 20px 12px;
      color: var(--text-secondary);
    }

    .empty-state .material-icons-round {
      font-size: 36px;
      margin-bottom: 8px;
      opacity: 0.3;
    }

    .empty-state p { font-size: 12px; margin-bottom: 4px; }
    .empty-state small { font-size: 10px; opacity: 0.8; }

    .text-secondary { color: var(--text-secondary); font-size: 11px; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .progress-ring {
      width: 36px;
      height: 36px;
      transform: rotate(-90deg);
    }

    .progress-ring-circle {
      fill: none;
      stroke: var(--border);
      stroke-width: 3;
    }

    .progress-ring-progress {
      fill: none;
      stroke: var(--primary);
      stroke-width: 3;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.5s ease;
    }
  </style>
</head>

<body>
  <!-- 헤더 -->
  <div class="header">
    <div class="app-title">
      <span class="receipt-icon">🧾</span>
      RECEIPT
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="themeToggle" title="테마 전환">
        <span class="material-icons-round">dark_mode</span>
      </button>
    </div>
  </div>

  <!-- 네비게이션 -->
  <div class="nav-bar">
    <button class="nav-btn active" data-view="home">
      <span class="material-icons-round">receipt_long</span>
      <span>Today</span>
    </button>
    <button class="nav-btn" data-view="dashboard">
      <span class="material-icons-round">bar_chart</span>
      <span>Stats</span>
    </button>
    <button class="nav-btn" data-view="sites">
      <span class="material-icons-round">language</span>
      <span>Sites</span>
    </button>
    <button class="nav-btn" data-view="settings">
      <span class="material-icons-round">settings</span>
      <span>Settings</span>
    </button>
  </div>

  <!-- 뷰 컨테이너 -->
  <div class="views-container">

    <!-- 홈: 영수증 뷰 -->
    <div class="view active" id="homeView">
      <div class="receipt-wrapper">

        <!-- 영수증 카드 -->
        <div class="receipt-card">
          <div class="receipt-inner">
            <div class="receipt-header">
              <div class="receipt-store-name">RECEIPT</div>
              <div class="receipt-tagline" id="receiptTagline">YOUR DAILY BROWSER RECEIPT</div>
            </div>

            <hr class="receipt-divider">

            <div class="receipt-meta">
              <span style="display:flex;align-items:center;gap:4px;">
                <span style="font-weight:700;letter-spacing:1px;">TODAY</span>
                <span id="receiptDate" style="opacity:0.7;">-</span>
              </span>
              <span id="receiptTime">-</span>
            </div>

            <!-- Viral stats row -->
            <div style="display:flex;flex-direction:column;gap:2px;padding:4px 0;font-size:9px;color:var(--text-secondary);letter-spacing:0.5px;">
              <div id="receiptStreak" style="display:none;"></div>
              <div id="receiptFirstSite" style="display:none;"></div>
              <div id="receiptDistract"></div>
            </div>

            <hr class="receipt-divider">

            <!-- 사이트 목록 -->
            <div class="receipt-items" id="receiptItems">
              <div class="receipt-empty">LOADING...</div>
            </div>

            <hr class="receipt-divider">

            <!-- 합계 -->
            <div class="receipt-total-row">
              <span class="receipt-total-label">TOTAL</span>
              <span class="receipt-total-value" id="receiptTotal">--</span>
            </div>

            <!-- 맥락 비교 -->
            <div id="receiptContext" style="font-size:10px;color:var(--text-secondary);text-align:center;padding:6px 0;letter-spacing:0.5px;"></div>

            <hr class="receipt-divider">

            <!-- 공유 버튼 -->
            <button class="receipt-share-btn" id="shareReceiptBtn">
              <span class="material-icons-round">content_copy</span>
              SHARE THIS RECEIPT
            </button>

            <div class="receipt-footer">
              <div class="receipt-footer-text">* THANK YOU FOR YOUR TIME *</div>
            </div>
          </div>
        </div>

        <!-- Category breakdown bar -->
        <div id="categoryBar" style="margin:8px 0 4px;height:6px;border-radius:3px;overflow:hidden;display:flex;gap:1px;"></div>

        <!-- Focus Mode row -->
        <div id="focusRow" style="padding:4px 0 4px;">
          <button id="focusModeBtn" class="btn-primary" style="width:100%;font-size:11px;padding:8px;justify-content:center;letter-spacing:0.5px;"></button>
          <div style="font-size:9px;color:var(--text-secondary);text-align:center;margin-top:3px;letter-spacing:0.3px;" id="focusModeDesc"></div>
        </div>

        <!-- 시간 제한 섹션 -->
        <div class="limit-section" style="margin-top:4px;">
          <div class="limit-section-title">
            <span class="material-icons-round">timer</span>
            <span id="limitSectionTitle">Time Limits</span>
          </div>
          <div id="currentLimit"></div>
          <div class="input-group">
            <input type="number" id="timeLimitMinutes" class="input-field" min="1" placeholder="minutes">
            <button id="setTimeLimit" class="btn-primary">
              <span class="material-icons-round">check</span>
              Set
            </button>
          </div>
        </div>

      </div>
    </div>

    <!-- 대시보드 뷰 -->
    <div class="view" id="dashboardView">
      <div style="padding: 12px;">
        <h3 class="section-title" style="margin-bottom: 12px;">
          <span class="material-icons-round">bar_chart</span>
          <span id="dashboardTitle">Stats</span>
        </h3>
        <div id="dashboardContent">
          <div class="loading"><div class="loading-spinner"></div></div>
        </div>
      </div>
    </div>

    <!-- 사이트 목록 뷰 -->
    <div class="view" id="sitesView">
      <div style="padding: 12px;">
        <h3 class="section-title" style="margin-bottom: 12px;">
          <span class="material-icons-round">language</span>
          <span id="sitesTitle">All Sites</span>
        </h3>
        <div id="sitesList" class="domains-list">
          <div class="loading"><div class="loading-spinner"></div></div>
        </div>
      </div>
    </div>

    <!-- 사이트 상세 뷰 -->
    <div class="view" id="siteDetailView">
      <div style="padding: 12px;">
        <div class="detail-header">
          <button class="back-btn" id="backFromSiteDetail">
            <span class="material-icons-round">arrow_back</span>
          </button>
          <h3 class="section-title" id="siteDetailTitle">Site Detail</h3>
        </div>
        <div id="siteDetailContent"></div>
      </div>
    </div>

    <!-- 설정 뷰 -->
    <div class="view" id="settingsView">
      <div style="padding: 12px;">
        <div class="detail-header">
          <button class="back-btn" id="backFromSettings">
            <span class="material-icons-round">arrow_back</span>
          </button>
          <h3 class="section-title">Settings</h3>
        </div>
        <div id="settingsContent"></div>
      </div>
    </div>

  </div>

  <script src="popup.js"></script>
</body>

</html>
