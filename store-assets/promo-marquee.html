<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tab Timer - Marquee Promo Tile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1400px;
            height: 560px;
            background: linear-gradient(135deg, #2196F3 0%, #1976D2 50%, #0D47A1 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 60px;
            color: white;
            overflow: hidden;
        }

        .left {
            flex: 1;
            max-width: 600px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .icon {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            backdrop-filter: blur(10px);
        }

        .title {
            font-size: 64px;
            font-weight: 700;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 24px;
            margin-top: 20px;
            opacity: 0.95;
            line-height: 1.6;
        }

        .features {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 18px;
        }

        .feature-icon {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .right {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .preview {
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 120px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <div class="left">
        <div class="logo-section">
            <div class="icon">⏰</div>
            <div class="title">Tab Timer</div>
        </div>
        <div class="subtitle">
            웹 사용 시간을 자동으로 추적하고<br>
            생산성을 높이는 스마트한 도구
        </div>
        <div class="features">
            <div class="feature">
                <div class="feature-icon">📊</div>
                <span>실시간 시간 추적</span>
            </div>
            <div class="feature">
                <div class="feature-icon">📈</div>
                <span>상세한 통계 및 분석</span>
            </div>
            <div class="feature">
                <div class="feature-icon">⏱️</div>
                <span>시간 제한 설정</span>
            </div>
            <div class="feature">
                <div class="feature-icon">🔒</div>
                <span>완전한 개인정보 보호</span>
            </div>
        </div>
    </div>
    <div class="right">
        <div class="preview">📱</div>
    </div>
</body>
</html>
